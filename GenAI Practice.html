    // --- 单题卡片组件 ---
    function QuestionCard({ question, index }) {
      const [selectedOption, setSelectedOption] = useState(null);
      const [showResult, setShowResult] = useState(false);

      const handleCheck = () => {
        if (selectedOption) {
          setShowResult(true);
        }
      };

      const getOptionClass = (key) => {
        let baseClass = "p-4 border rounded-xl mb-3 cursor-pointer transition-all duration-200 flex items-start gap-3 ";
        
        if (!showResult) {
          if (selectedOption === key) {
            baseClass += "border-blue-500 bg-blue-50 ring-2 ring-blue-200";
          } else {
            baseClass += "border-gray-200 hover:border-blue-300 hover:bg-gray-50";
          }
        } else {
          if (key === question.ans) {
            baseClass += "border-green-500 bg-green-50 text-green-900 ring-2 ring-green-200";
          } else if (selectedOption === key && key !== question.ans) {
            baseClass += "border-red-500 bg-red-50 text-red-900";
          } else {
            baseClass += "border-gray-100 bg-gray-50 text-gray-400 opacity-60";
          }
          baseClass += " cursor-default";
        }
        return baseClass;
      };

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-8 hover:shadow-md transition-shadow">
          <h3 className="text-lg font-medium text-gray-800 mb-5 leading-relaxed whitespace-pre-wrap">
            <span className="inline-block bg-blue-100 text-blue-700 font-bold px-3 py-1 rounded-lg text-sm mr-3">
              Q{index + 1}
            </span>
            {question.q}
          </h3>

          <div className="space-y-2 mb-6">
            {Object.entries(question.opts).map(([key, text]) => (
              <div 
                key={key} 
                className={getOptionClass(key)}
                onClick={() => !showResult && setSelectedOption(key)}
              >
                <div className={`mt-0.5 w-6 h-6 shrink-0 rounded-full border-2 flex items-center justify-center font-bold text-sm
                  ${showResult && key === question.ans ? 'border-green-500 bg-green-500 text-white' : 
                    showResult && selectedOption === key ? 'border-red-500 bg-red-500 text-white' :
                    selectedOption === key ? 'border-blue-500 bg-blue-500 text-white' : 'border-gray-300 text-gray-500'}`}
                >
                  {key}
                </div>
                <div className="leading-relaxed flex-1">
                  {text}
                </div>
              </div>
            ))}
          </div>

          {!showResult ? (
            <button 
              onClick={handleCheck}
              disabled={!selectedOption}
              className={`w-full py-3 rounded-xl font-medium transition-colors ${
                selectedOption 
                  ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-sm' 
                  : 'bg-gray-100 text-gray-400 cursor-not-allowed'
              }`}
            >
              Check Answer / 确认答案
            </button>
          ) : (
            <div className="mt-6 pt-6 border-t border-gray-100 animate-fade-in-up">
              <div className="flex items-center gap-2 mb-4">
                {selectedOption === question.ans ? (
                  <div className="bg-green-100 text-green-700 px-4 py-2 rounded-lg font-bold flex items-center gap-2">
                    <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"></path></svg>
                    回答正确 (Correct)
                  </div>
                ) : (
                  <div className="bg-red-100 text-red-700 px-4 py-2 rounded-lg font-bold flex items-center gap-2">
                     <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd"></path></svg>
                    回答错误 (Incorrect)
                  </div>
                )}
              </div>

              <div className="bg-blue-50/50 rounded-xl p-5 space-y-4 text-sm text-gray-700 border border-blue-100/50">
                 <div>
                    <h4 className="font-bold text-gray-900 flex items-center gap-2 mb-1">
                       <svg className="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
                       中文翻译
                    </h4>
                    <p className="whitespace-pre-line leading-relaxed text-gray-600">
                      {question.trans}
                    </p>
                 </div>
                 <div className="pt-3 border-t border-blue-100">
                    <h4 className="font-bold text-gray-900 flex items-center gap-2 mb-1">
                      <svg className="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                      考点解析
                    </h4>
                    <p className="leading-relaxed text-gray-800 font-medium">
                      {question.exp}
                    </p>
                 </div>
              </div>
            </div>
          )}
        </div>
      );
    }

        if (!window.hasOwnProperty('_appWatermark')) {
          Object.defineProperty(window, '_appWatermark', {
            value: 'Created by [微信公众号sekkoo的知识星球] - Unauthorized use is monitored.',
            writable: false,
            enumerable: false, // 设为不可枚举
            configurable: false
          });
        }
      }, []);

      const activeModule = quizData[activeModuleIdx];

      return (
        <div className="min-h-screen flex flex-col md:flex-row font-sans text-gray-800 selection:bg-blue-200">
          
          <div className="md:hidden bg-white border-b border-gray-200 p-4 flex justify-between items-center sticky top-0 z-20 shadow-sm">
            <h1 className="font-bold text-lg text-blue-900 truncate pr-4">Google AI 备考</h1>
            <button 
              onClick={() => setIsSidebarOpen(!isSidebarOpen)}
              className="p-2 bg-gray-100 rounded-lg text-gray-600 hover:bg-gray-200"
            >
              <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d={isSidebarOpen ? "M6 18L18 6M6 6l12 12" : "M4 6h16M4 12h16M4 18h16"}></path></svg>
            </button>
          </div>

          <aside className={`
            ${isSidebarOpen ? 'block' : 'hidden'} md:block 
            w-full md:w-80 lg:w-96 bg-white border-r border-gray-200 flex-shrink-0 flex flex-col
            fixed md:sticky top-[73px] md:top-0 h-[calc(100vh-73px)] md:h-screen z-10 overflow-y-auto shadow-xl md:shadow-none transition-transform
          `}>
            <div className="p-6">
              <div className="hidden md:block mb-8">
                <h1 className="text-2xl font-black text-blue-900 tracking-tight">GenAI <span className="text-blue-500">Practice</span></h1>
                <p className="text-sm text-gray-500 mt-1">Google Cloud 考证刷题系统</p>
              </div>
              
              <nav className="space-y-3">
                {quizData.map((mod, idx) => (
                  <button
                    key={idx}
                    onClick={() => {
                      setActiveModuleIdx(idx);
                      setIsSidebarOpen(false);
                      window.scrollTo({ top: 0, behavior: 'smooth' });
                    }}
                    className={`w-full text-left p-4 rounded-xl transition-all duration-200 border ${
                      activeModuleIdx === idx 
                        ? 'bg-blue-600 text-white border-blue-600 shadow-md transform scale-[1.02]' 
                        : 'bg-white text-gray-600 border-gray-100 hover:border-blue-200 hover:bg-blue-50'
                    }`}
                  >
                    <div className="text-xs font-bold uppercase tracking-wider mb-1 opacity-80">Module {idx + 1}</div>
                    <div className="font-medium line-clamp-2 leading-tight">
                      {mod.title.split(' (')[0]}
                    </div>
                    <div className="text-xs mt-3 flex items-center gap-1 opacity-80">
                       <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                       {mod.questions.length} Questions
                    </div>
                  </button>
                ))}
              </nav>
            </div>
          </aside>

          <main className="flex-1 max-w-4xl mx-auto w-full p-4 md:p-8 lg:p-12 overflow-x-hidden">
            
            <Disclaimer />

            <div className="mb-8 md:mb-10 animate-fade-in">
              <div className="inline-block bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full mb-3 uppercase tracking-wide">
                Module {activeModuleIdx + 1}
              </div>
              <h2 className="text-2xl md:text-3xl font-bold text-gray-900 leading-snug">
                {activeModule.title}
              </h2>
              <p className="text-gray-500 mt-2">
                共 {activeModule.questions.length} 道题目，认真阅读英文原题后作答。
              </p>
            </div>

            <div className="space-y-6">
              {activeModule.questions.map((q, idx) => (
                <QuestionCard key={`${activeModuleIdx}-${q.id}`} question={q} index={idx} />
              ))}
            </div>

            <div className="mt-12 text-center text-gray-400 text-sm pb-8">
              <p>End of Module {activeModuleIdx + 1}</p>
            </div>
          </main>
        </div>
      );
    }

    // --- 渲染到 DOM ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
